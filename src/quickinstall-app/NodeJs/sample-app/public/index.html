<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Node.js no HestiaCP</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #0f1923 0%, #1a2a3a 100%);
    color: #e0e0e0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .card {
    background: #1e2d3d;
    border-radius: 16px;
    padding: 48px;
    max-width: 560px;
    width: 90%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    border: 1px solid #2a3f52;
  }
  .logo {
    width: 80px;
    height: 80px;
    background: #68bd45;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    font-size: 40px;
    color: #fff;
  }
  h1 { font-size: 24px; margin-bottom: 8px; color: #fff; }
  .sub { color: #8899aa; margin-bottom: 24px; font-size: 14px; }
  .info {
    background: #0f1923;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 24px;
    font-size: 13px;
    text-align: left;
    line-height: 1.8;
  }
  .info strong { color: #68bd45; }
  .info span { color: #8899aa; }
  .status {
    display: inline-block;
    background: #68bd45;
    color: #fff;
    padding: 8px 24px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
  }
  .footer { margin-top: 24px; font-size: 12px; color: #556677; }
  .footer a { color: #68bd45; text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">&#x2b22;</div>
  <h1>Node.js no HestiaCP</h1>
  <p class="sub">Sua aplicação Node.js está rodando com sucesso!</p>
  <div class="info">
    <strong>&#x2713;</strong> PM2 gerenciando o processo<br>
    <strong>&#x2713;</strong> Nginx como proxy reverso<br>
    <strong>&#x2713;</strong> NVM gerenciando a versão do Node<br>
    <strong>&#x2713;</strong> Pronto para produção
  </div>
  <div class="status">Online</div>
  <div class="footer">
    <a href="https://hestiacp.com" target="_blank">HestiaCP</a> &middot;
    <a href="https://nodejs.org" target="_blank">Node.js</a> &middot;
    Gerenciado por PM2
  </div>
</div>
</body>
</html>
